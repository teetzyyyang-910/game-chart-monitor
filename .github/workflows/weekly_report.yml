name: 每週遊戲排行榜週報

on:
  schedule:
    - cron: "30 2 * * 1"   # 每週一 台灣時間 10:30
    - cron: "30 2 * * 5"   # 每週五 台灣時間 10:30
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run weekly report
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:   ${{ secrets.RECIPIENT_EMAILS }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL:      ${{ secrets.SLACK_CHANNEL }}
          REPORT_URL:         ${{ secrets.REPORT_URL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Save snapshot and deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p reports
          cp preview_report.html reports/preview_report.html
          git add -f reports/preview_report.html
          git add -f rank_snapshot.json
          git diff --staged --quiet || git commit -m "📊 Update report & snapshot $(date +'%Y/%m/%d')"
          git pull --rebase origin main || true
          git push || (sleep 10 && git pull --rebase origin main && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
