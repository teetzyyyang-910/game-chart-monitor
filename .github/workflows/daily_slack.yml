name: 每日 Slack 排名變動通知

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 台灣時間 10:00
  workflow_dispatch:

jobs:
  slack-notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Download previous snapshot
        uses: actions/download-artifact@v4
        with:
          name: rank-snapshot
          path: .
        continue-on-error: true

      - name: Run Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL:     ${{ secrets.SLACK_CHANNEL }}
          REPORT_URL:        ${{ secrets.REPORT_URL }}
        run: python slack_notify.py

      - name: Save rank snapshot
        uses: actions/upload-artifact@v4
        with:
          name: rank-snapshot
          path: rank_snapshot.json
          retention-days: 30
          overwrite: true
